worker_processes auto;
events { worker_connections 1024; }

stream {
    map $ssl_preread_server_name $tls_backend {
        qwoljs.mooo.com naive_tls;
        default reality_tls;
    }

    upstream naive_tls { server 127.0.0.1:9444; }
    upstream reality_tls { server 127.0.0.1:1443; }

    server {
        listen 443;
        proxy_pass $tls_backend;
        ssl_preread on;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    server {
        listen 80;
        server_name qwoljs.mooo.com;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $uri $uri/ =404; }
    }

    # Нужен только на время HTTP-01 проверки Let's Encrypt.
    server {
        listen 80;
        server_name nedobot.chickenkiller.com;
        root /usr/share/nginx/html;
        location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
        location / { return 404; }
    }

    server {
        listen 9443 ssl;
        http2 on;
        server_name qwoljs.mooo.com simple.wikipedia.org;
        ssl_certificate /etc/sing-box/hy2.crt;
        ssl_certificate_key /etc/sing-box/hy2.key;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $uri $uri/ =404; }
    }
}
