worker_processes auto;
events { worker_connections 1024; }

stream {
    map $ssl_preread_server_name $tls_backend {
        nedobot.chickenkiller.com nedobot_tls;
        qwoljs.mooo.com naive_tls;
        default reality_tls;
    }

    upstream nedobot_tls { server 127.0.0.1:9445; }
    upstream naive_tls { server 127.0.0.1:9444; }
    upstream reality_tls { server 127.0.0.1:1443; }

    server {
        listen 443;
        proxy_pass $tls_backend;
        ssl_preread on;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    server {
        listen 80;
        server_name qwoljs.mooo.com;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $uri $uri/ =404; }
    }

    server {
        listen 80;
        server_name nedobot.chickenkiller.com;
        root /usr/share/nginx/html;
        location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
        location / { return 308 https://$host$request_uri; }
    }

    server {
        listen 9443 ssl;
        http2 on;
        server_name qwoljs.mooo.com simple.wikipedia.org;
        ssl_certificate /etc/sing-box/hy2.crt;
        ssl_certificate_key /etc/sing-box/hy2.key;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $uri $uri/ =404; }
    }

    server {
        listen 9445 ssl;
        http2 on;
        server_name nedobot.chickenkiller.com;
        ssl_certificate /etc/letsencrypt/live/nedobot.chickenkiller.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nedobot.chickenkiller.com/privkey.pem;
        add_header X-Content-Type-Options nosniff always;

        location ^~ /tg-ai-bot-static/avatars/ {
            alias /srv/nedobot-static/avatars/;
            try_files $uri =404;
            limit_except GET HEAD { deny all; }
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }

        location = /mcp/nedonews {
            proxy_pass http://127.0.0.1:8787/mcp/nedonews;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            client_max_body_size 1m;
        }

        location / { return 404; }
    }
}
