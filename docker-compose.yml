services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-ai-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_ai_bot
      POSTGRES_USER: tg_ai_bot
      POSTGRES_PASSWORD: tg_ai_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_ai_bot -d tg_ai_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
