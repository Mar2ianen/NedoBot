services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    container_name: tg-ai-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_ai_bot
      POSTGRES_USER: tg_ai_bot
      POSTGRES_PASSWORD: tg_ai_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_ai_bot -d tg_ai_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: nedobot-rag-embedding
    restart: unless-stopped
    command:
      - --model-id
      - cointegrated/rubert-tiny2
      - --dtype
      - float32
    ports:
      - "127.0.0.1:8788:80"
    volumes:
      - rag_embedding_data:/data

volumes:
  postgres_data:
  rag_embedding_data:
